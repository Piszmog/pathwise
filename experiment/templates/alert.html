<div
	class="rounded-md p-4 {% if alert_type == AlertType::Warning %}bg-yellow-50{% endif %} {% if alert_type == AlertType::Error %}bg-red-50{% endif %} {% if alert_type == AlertType::Success %}bg-green-50{% endif %}">
	<div class="flex">
		<div class="flex-shrink-0">
			{% match alert_type %}
			{% when AlertType::Success %}
			<path fill-rule="evenodd"
				d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z"
				clip-rule="evenodd"></path>
			</svg>
			{% when AlertType::Error %}
			<svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
				<path fill-rule="evenodd"
					d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z"
					clip-rule="evenodd"></path>
			</svg>
			{% when AlertType::Warning %}
			<svg class="h-5 w-5 text-yellow-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
				<path fill-rule="evenodd"
					d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z"
					clip-rule="evenodd"></path>
			</svg>
			{% endmatch %}
		</div>
		<div class="ml-3">
			<h3
				class="text-sm font-medium {% if alert_type == AlertType::Warning %}text-yellow-800{% endif %} {% if alert_type == AlertType::Error %}text-red-800{% endif %} {% if alert_type == AlertType::Success %}text-green-800{% endif %}">
				{{ title }}
			</h3>
			<div
				class="mt-2 text-sm {% if alert_type == AlertType::Warning %}text-yellow-700{% endif %} {% if alert_type == AlertType::Error %}text-red-700{% endif %} {% if alert_type == AlertType::Success %}text-green-700{% endif %}">
				{% if messages.len() > 1 %}
				<ul role="list" class="list-disc space-y-1 pl-5">
					{% for message in messages %}
					<li>{{ message }}</li>
					{% endfor %}
				</ul>
				{% else %}
				<p>{{ messages[0] }}</p>
				{% endif %}
			</div>
		</div>
	</div>
</div>
